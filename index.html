<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hobby Shop Yu — AIツール</title>
  <meta name="description" content="3児パパエンジニア・Kが作るAIクリエイターツール">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6c5ce7, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    p {
      color: #8888a0;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }
    .tools {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 400px;
      margin: 0 auto;
    }
    a.tool-link {
      display: block;
      padding: 20px 24px;
      background: #1a1a28;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      color: #e8e8f0;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s;
    }
    a.tool-link:hover {
      border-color: #6c5ce7;
      box-shadow: 0 0 24px rgba(108, 92, 231, 0.15);
      transform: translateY(-2px);
    }
    a.tool-link .emoji { font-size: 1.4rem; margin-right: 10px; }
    a.tool-link .desc {
      display: block;
      font-size: 0.8rem;
      color: #8888a0;
      font-weight: 400;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hobby Shop Yu</h1>
    <p>AIクリエイターツール</p>
    <div class="tools">
      <a href="/line-apng-maker/" class="tool-link">
        <span class="emoji">🎬</span>LINE APNG スタンプメーカー
        <span class="desc">動画 → アニメーションスタンプ変換ツール</span>
      </a>
    </div>
  </div>
</body>
</html>
